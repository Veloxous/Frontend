version: 2
updates:
  # npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
    open-pull-requests-limit: 5
    reviewers:
      - 'Heliobond/frontend-maintainers'
    # Group minor and patch updates to reduce noise
    groups:
      minor-and-patch:
        dependency-type: 'all'
        update-types:
          - 'minor'
          - 'patch'
      major:
        dependency-type: 'all'
        update-types:
          - 'major'
    # Don't update pre-release versions unless already using one
    allow:
      - dependency-type: 'production'
      - dependency-type: 'development'
    ignore:
      # Add any specific versions to ignore here if needed
      # Example:
      # - dependency-name: "some-package"
      #   versions: ["1.0.0"]

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
    open-pull-requests-limit: 3
    reviewers:
      - 'Heliobond/frontend-maintainers'
    groups:
      minor-and-patch:
        dependency-type: 'all'
        update-types:
          - 'minor'
          - 'patch'
      major:
        dependency-type: 'all'
        update-types:
          - 'major'
