name: Feature request / task
description: Propose a feature, improvement, or contributor task.
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What need does this serve? Tie it to a user goal or the on-chain product where you can.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What should be built or changed? Sketch the approach if you have one.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend (React / TypeScript)
        - Smart contracts / on-chain wiring
        - Localization (i18n)
        - Accessibility
        - Design system
        - Docs / tooling
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know it's done? (Bullet list.)
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, pointers to relevant files.
