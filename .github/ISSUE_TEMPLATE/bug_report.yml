name: Bug report
description: Something in the app is broken or behaves incorrectly.
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For **security** issues, please don't file here — use the Security tab → "Report a vulnerability".
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: When I … I expected … but instead …
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See …
    validations:
      required: true
  - type: input
    id: route
    attributes:
      label: Route / screen
      placeholder: '/deposit, /admin, /project/1, …'
  - type: dropdown
    id: theme-locale
    attributes:
      label: Theme / locale (if relevant)
      multiple: true
      options:
        - Light
        - Dark
        - English
        - French
  - type: input
    id: env
    attributes:
      label: Browser & OS
      placeholder: 'Chrome 130 on macOS 15'
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / console errors
      description: Drag images in, and paste any console errors.
